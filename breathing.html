<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>فحص أجهزة التنفس — مركز كبد</title>
<meta name="theme-color" content="#16181C">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#E9EAE4;--surface:#FFFFFF;--ink:#16181C;--muted:#6A6F77;
  --line:#DDDED6;--line-strong:#C9CAC1;
  --ember:#D33C1C;--ember-soft:#FBE7E0;
  --water:#137C9E;--water-soft:#E1F0F5;
  --green:#1B7A3D;--green-soft:#E2F3E8;
  --orange:#E6790B;--orange-soft:#FFF3E0;
  --header:#16181C;--radius:16px;
  --shadow:0 1px 2px rgba(22,24,28,.05), 0 8px 24px rgba(22,24,28,.06);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font-family:"IBM Plex Sans Arabic",system-ui,sans-serif;font-size:16px;line-height:1.5;padding-bottom:120px;-webkit-font-smoothing:antialiased;}
.mono{font-family:"IBM Plex Mono",monospace;font-feature-settings:"tnum";}
header{position:sticky;top:0;z-index:30;background:var(--header);color:#F4F3EE;padding:calc(env(safe-area-inset-top) + 16px) 18px 16px;border-bottom:3px solid var(--orange);}
.h-eyebrow{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:2px;color:#9AA0A8;text-transform:uppercase;display:flex;align-items:center;gap:8px;}
.h-eyebrow::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--orange);display:inline-block;box-shadow:0 0 0 3px rgba(230,121,11,.25);}
header h1{margin:6px 0 0;font-size:22px;font-weight:700;letter-spacing:-.2px;}
.user-badge{display:inline-block;margin-top:6px;font-size:12px;color:#9AA0A8;background:rgba(255,255,255,.08);padding:4px 10px;border-radius:8px;}
main{max-width:600px;margin:0 auto;padding:16px 14px 0;}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:14px;}
.field-head{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.field-num{font-family:"IBM Plex Mono",monospace;font-weight:600;font-size:12px;width:26px;height:26px;flex:none;border-radius:8px;background:var(--ink);color:#fff;display:grid;place-items:center;}
.field-title{font-weight:700;font-size:16px;}
.field-sub{font-size:12.5px;color:var(--muted);margin-top:2px;}
.select-wrap{position:relative;}
select{width:100%;appearance:none;-webkit-appearance:none;font-family:"IBM Plex Sans Arabic",sans-serif;font-size:18px;font-weight:600;color:var(--ink);background:#F7F7F3;border:1.5px solid var(--line-strong);border-radius:12px;padding:16px 18px;padding-left:44px;}
select:focus-visible{outline:2px solid var(--orange);outline-offset:2px;}
select.placeholder{color:var(--muted);font-weight:500;}
.select-wrap::after{content:"";position:absolute;left:18px;top:50%;width:10px;height:10px;margin-top:-7px;border-right:2px solid var(--muted);border-bottom:2px solid var(--muted);transform:rotate(45deg);pointer-events:none;}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;}
.toggle-row .lbl{font-weight:600;font-size:15px;}
.toggle-btns{display:flex;gap:6px;}
.toggle-btns label{display:flex;align-items:center;gap:6px;padding:10px 14px;border-radius:10px;border:2px solid var(--line-strong);cursor:pointer;font-weight:700;font-size:14px;transition:all .15s;}
.toggle-btns input{accent-color:var(--green);width:18px;height:18px;}

.cyl-section{display:none;}
.cyl-group-title{font-weight:700;font-size:15px;margin:16px 0 10px;padding:8px 12px;border-radius:10px;text-align:center;}
.cyl-group-basic{background:var(--water-soft);color:var(--water);}
.cyl-group-reserve{background:var(--orange-soft);color:var(--orange);}
.cyl-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(150px, 1fr));gap:12px;}

.gauge-wrap{display:flex;flex-direction:column;align-items:center;padding:10px;background:#FAFAF7;border:1px solid var(--line);border-radius:14px;}
.gauge-label{font-weight:700;font-size:13px;color:var(--muted);margin-bottom:4px;}
.gauge-container{position:relative;width:140px;height:85px;touch-action:none;user-select:none;cursor:pointer;}
.gauge-svg{width:100%;height:100%;}
.gauge-value{position:absolute;bottom:2px;left:50%;transform:translateX(-50%);font-family:"IBM Plex Mono",monospace;font-weight:700;font-size:22px;line-height:1;}
.gauge-value span{font-size:11px;color:var(--muted);font-weight:600;}
.gauge-min,.gauge-max{position:absolute;bottom:-2px;font-family:"IBM Plex Mono",monospace;font-size:10px;color:var(--muted);font-weight:600;}
.gauge-min{right:4px;}
.gauge-max{left:4px;}

.sendbar{position:fixed;bottom:0;left:0;right:0;z-index:40;background:rgba(233,234,228,.9);backdrop-filter:blur(10px);border-top:1px solid var(--line);padding:12px 14px calc(env(safe-area-inset-bottom) + 12px);}
.sendbar .inner{max-width:600px;margin:0 auto;}
.send-btn{width:100%;border:none;border-radius:14px;cursor:pointer;background:var(--green);color:#fff;font-family:inherit;font-weight:700;font-size:18px;padding:18px;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 6px 18px rgba(27,122,61,.35);transition:transform .08s;}
.send-btn:active{transform:scale(.98);}
.err{display:none;background:var(--ember-soft);color:#9a2a12;border:1px solid #f0b9a9;border-radius:10px;padding:10px 14px;font-size:13.5px;font-weight:600;margin-bottom:10px;}
.back-link{display:block;text-align:center;margin-top:12px;color:var(--water);font-weight:700;font-size:14px;text-decoration:none;}
</style>
</head>
<body>
<header>
  <div class="h-eyebrow">CIVIL DEFENSE · KABD</div>
  <h1>فحص أجهزة التنفس</h1>
  <div class="user-badge" id="userBadge"></div>
</header>
<main>

  <!-- 1. اختيار الآلية -->
  <section class="card">
    <div class="field-head"><div class="field-num">1</div><div><div class="field-title">رقم الآلية</div><div class="field-sub">اختر الآلية لفحص أسطواناتها</div></div></div>
    <div class="select-wrap">
      <select id="vehicle" class="placeholder mono" onchange="onVehicleChange()">
        <option value="" selected disabled>اختر رقم الآلية</option>
        <option value="139">139 — جيب الضابط</option>
        <option value="239">239 — الإنقاذ</option>
        <option value="339">339 — البمب</option>
      </select>
    </div>
  </section>

  <!-- 2. ساعة فحص الأسطوانات -->
  <section class="card cyl-section" id="sec-clock">
    <div class="field-head"><div class="field-num">2</div><div><div class="field-title">ساعة فحص الأسطوانات</div><div class="field-sub">هل ساعة الفحص تعمل؟</div></div></div>
    <div class="toggle-row">
      <div class="lbl">ساعة الفحص</div>
      <div class="toggle-btns">
        <label><input type="radio" name="clock" value="تعمل"> تعمل</label>
        <label><input type="radio" name="clock" value="لا تعمل"> لا تعمل</label>
      </div>
    </div>
  </section>

  <!-- 3. الأسطوانات -->
  <section class="card cyl-section" id="sec-cylinders">
    <div class="field-head"><div class="field-num">3</div><div><div class="field-title">ضغط الأسطوانات</div><div class="field-sub">اسحب العداد لتحديد ضغط كل أسطوانة (0–300 بار)</div></div></div>
    <div id="cylinderArea"></div>
  </section>

</main>

<div class="sendbar"><div class="inner">
  <div class="err" id="err"></div>
  <button class="send-btn" id="send" type="button">✓ حفظ فحص الأسطوانات</button>
  <a href="entry.html" class="back-link">← العودة لصفحة الدخول</a>
</div></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig={apiKey:"AIzaSyBfi7BxhuMVehfmtvIOLm1MVYeXk_BWVz0",authDomain:"nawwaf-7258c.firebaseapp.com",databaseURL:"https://nawwaf-7258c-default-rtdb.firebaseio.com",projectId:"nawwaf-7258c",storageBucket:"nawwaf-7258c.firebasestorage.app",messagingSenderId:"391747168751",appId:"1:391747168751:web:01777a553f7250d4ce6e1a"};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

const currentUser=JSON.parse(localStorage.getItem("kabd_current_user")||"null");
if(currentUser){
  document.getElementById("userBadge").textContent="🪪 "+currentUser.name+" — ملف: "+currentUser.fileNumber;
}

const vehicleCylinders={
  "139":{basic:2,reserve:2},
  "239":{basic:3,reserve:3},
  "339":{basic:6,reserve:6}
};

const gaugeValues={};

function createGaugeSVG(id,label){
  const cx=70, cy=72, r=58;
  const wrap=document.createElement("div");
  wrap.className="gauge-wrap";
  wrap.innerHTML=`
    <div class="gauge-label">${label}</div>
    <div class="gauge-container" data-id="${id}">
      <svg class="gauge-svg" viewBox="0 0 140 85">
        <path d="${describeArc(cx,cy,r,180,0)}" fill="none" stroke="#EAEAE3" stroke-width="12" stroke-linecap="round"/>
        <path class="gauge-fill" d="${describeArc(cx,cy,r,180,180)}" fill="none" stroke="#D33C1C" stroke-width="12" stroke-linecap="round"/>
        <circle class="gauge-handle" cx="${cx-r}" cy="${cy}" r="10" fill="#fff" stroke="#D33C1C" stroke-width="4" style="filter:drop-shadow(0 2px 4px rgba(0,0,0,.25));"/>
      </svg>
      <div class="gauge-value"><span class="gauge-num">0</span> <span>bar</span></div>
      <div class="gauge-min">0</div>
      <div class="gauge-max">300</div>
    </div>`;
  gaugeValues[id]=0;
  return wrap;
}

function describeArc(cx,cy,r,startAngle,endAngle){
  const s=polarToCartesian(cx,cy,r,startAngle);
  const e=polarToCartesian(cx,cy,r,endAngle);
  const large=Math.abs(endAngle-startAngle)>180?1:0;
  return `M ${s.x} ${s.y} A ${r} ${r} 0 ${large} 1 ${e.x} ${e.y}`;
}
function polarToCartesian(cx,cy,r,angleDeg){
  const rad=(angleDeg)*Math.PI/180;
  return{x:cx+r*Math.cos(rad), y:cy-r*Math.sin(rad)};
}

function getColor(val){
  if(val<100) return "#D33C1C";
  if(val<200) return "#E6790B";
  return "#1B7A3D";
}

function updateGauge(container,val){
  val=Math.max(0,Math.min(300,Math.round(val)));
  const id=container.dataset.id;
  gaugeValues[id]=val;
  const cx=70,cy=72,r=58;
  const angle=180-(val/300)*180;
  const fill=container.querySelector(".gauge-fill");
  const handle=container.querySelector(".gauge-handle");
  const numEl=container.querySelector(".gauge-num");
  const color=getColor(val);
  fill.setAttribute("d",describeArc(cx,cy,r,180,angle));
  fill.setAttribute("stroke",color);
  handle.setAttribute("stroke",color);
  const pt=polarToCartesian(cx,cy,r,angle);
  handle.setAttribute("cx",pt.x);
  handle.setAttribute("cy",pt.y);
  numEl.textContent=val;
}

function getAngleFromEvent(container,e){
  const rect=container.getBoundingClientRect();
  const cx=rect.left+rect.width/2;
  const cy=rect.top+rect.height*0.85;
  const clientX=e.touches?e.touches[0].clientX:e.clientX;
  const clientY=e.touches?e.touches[0].clientY:e.clientY;
  let angle=Math.atan2(cy-clientY, clientX-cx)*180/Math.PI;
  if(angle<0) angle=0;
  if(angle>180) angle=180;
  return (angle/180)*300;
}

function attachGaugeEvents(container){
  let dragging=false;
  function start(e){
    e.preventDefault();
    dragging=true;
    const val=getAngleFromEvent(container,e);
    updateGauge(container,val);
  }
  function move(e){
    if(!dragging) return;
    e.preventDefault();
    const val=getAngleFromEvent(container,e);
    updateGauge(container,val);
  }
  function end(){ dragging=false; }
  container.addEventListener("mousedown",start);
  container.addEventListener("touchstart",start,{passive:false});
  window.addEventListener("mousemove",move);
  window.addEventListener("touchmove",move,{passive:false});
  window.addEventListener("mouseup",end);
  window.addEventListener("touchend",end);
}

function onVehicleChange(){
  const v=document.getElementById("vehicle").value;
  document.getElementById("vehicle").classList.remove("placeholder");
  document.getElementById("sec-cylinders").style.display="block";
  document.getElementById("sec-clock").style.display=(v==="139")?"block":"none";

  const area=document.getElementById("cylinderArea");
  area.innerHTML="";
  const cfg=vehicleCylinders[v];
  if(!cfg) return;

  // Clear old values
  Object.keys(gaugeValues).forEach(k=>delete gaugeValues[k]);

  // Basic cylinders
  const basicTitle=document.createElement("div");
  basicTitle.className="cyl-group-title cyl-group-basic";
  basicTitle.textContent="أسطوانات أساسية ("+cfg.basic+")";
  area.appendChild(basicTitle);

  const basicGrid=document.createElement("div");
  basicGrid.className="cyl-grid";
  for(let i=1;i<=cfg.basic;i++){
    const g=createGaugeSVG("basic_"+i,"أسطوانة "+i);
    basicGrid.appendChild(g);
  }
  area.appendChild(basicGrid);

  // Reserve cylinders
  const resTitle=document.createElement("div");
  resTitle.className="cyl-group-title cyl-group-reserve";
  resTitle.textContent="أسطوانات احتياط ("+cfg.reserve+")";
  area.appendChild(resTitle);

  const resGrid=document.createElement("div");
  resGrid.className="cyl-grid";
  for(let i=1;i<=cfg.reserve;i++){
    const g=createGaugeSVG("reserve_"+i,"احتياط "+i);
    resGrid.appendChild(g);
  }
  area.appendChild(resGrid);

  // Attach events after DOM is ready
  requestAnimationFrame(()=>{
    area.querySelectorAll(".gauge-container").forEach(c=>{
      attachGaugeEvents(c);
      updateGauge(c,0);
    });
  });
}

const err=document.getElementById("err");
document.getElementById("send").addEventListener("click",()=>{
  const v=document.getElementById("vehicle").value;
  if(!v){ err.textContent="الرجاء اختيار رقم الآلية"; err.style.display="block"; return; }
  const clock=(document.querySelector('input[name="clock"]:checked')||{}).value||"";
  if(v==="139"&&!clock){ err.textContent="الرجاء تحديد حالة ساعة الفحص"; err.style.display="block"; return; }
  err.style.display="none";

  const data={
    vehicle:v,
    clock:clock,
    cylinders:gaugeValues,
    operator:currentUser?currentUser.name:"",
    fileNumber:currentUser?currentUser.fileNumber:"",
    timestamp:new Date().toISOString()
  };

  db.ref("breathing/"+v).set(data).then(()=>{
    const btn=document.getElementById("send");
    btn.textContent="✓ تم حفظ الفحص";
    btn.style.background="#1B7A3D";
    setTimeout(()=>{ btn.textContent="✓ حفظ فحص الأسطوانات"; },2000);
  }).catch(()=>{
    err.textContent="خطأ في الحفظ — تأكد من الإنترنت";
    err.style.display="block";
  });
});
</script>
</body>
</html>
