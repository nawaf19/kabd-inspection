<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>طباعة كشف الفحص — مركز كبد</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background:#f0f0f0;color:#000;font-family:"IBM Plex Sans Arabic",system-ui,sans-serif;font-size:13px;line-height:1.4;-webkit-font-smoothing:antialiased;}

.toolbar{position:sticky;top:0;z-index:30;background:#16181C;color:#F4F3EE;padding:12px 18px;border-bottom:3px solid #D33C1C;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.toolbar h1{margin:0;font-size:16px;font-weight:700;}
.toolbar-actions{display:flex;gap:8px;flex-wrap:wrap;}
.t-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;font-family:inherit;font-size:13px;font-weight:600;padding:8px 14px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:6px;}
.t-btn.primary{background:#D33C1C;border-color:#D33C1C;}
.t-btn svg{width:16px;height:16px;}
.back-link{color:#9AA0A8;text-decoration:none;font-size:13px;font-weight:600;}

.print-area{max-width:1100px;margin:16px auto;padding:0 14px;}
.report{background:#fff;border:2px solid #000;overflow:hidden;}
.report-header{text-align:center;padding:12px 16px;border-bottom:2px solid #000;}
.report-header h2{margin:0 0 2px;font-size:17px;font-weight:700;}
.report-header .sub{font-size:11px;color:#555;letter-spacing:1px;}
.report-meta{display:flex;justify-content:space-between;padding:6px 16px;border-bottom:2px solid #000;font-size:12px;font-weight:700;background:#f8f8f8;}

.section-title{background:#f0f0f0;color:#000;padding:6px 16px;font-weight:700;font-size:13px;border-top:2px solid #000;border-bottom:1.5px solid #000;text-align:center;letter-spacing:.5px;}

table{width:100%;border-collapse:collapse;}
th,td{border:1px solid #000;padding:5px 7px;text-align:center;font-size:11px;vertical-align:middle;}
th{background:#e8e8e8;color:#000;font-weight:700;font-size:10px;letter-spacing:.2px;}
td{background:#fff;}
.vl{font-weight:700;font-size:12px;background:#f4f4f4;white-space:nowrap;}
.not-done{color:#000;font-size:11px;}
.done-status{background:none;color:#000;font-weight:400;}
.val{font-weight:600;font-size:11px;}
.notes-cell{text-align:right;font-size:10px;max-width:110px;word-break:break-word;}
.ok{font-weight:700;}
.bad{font-weight:700;}
.photo-cell img{max-width:100px;max-height:70px;border:1px solid #999;}
.no-photo .photo-col{display:none!important;}

@media print{
  body{background:#fff;font-size:8.5px;}
  .toolbar{display:none!important;}
  .print-area{margin:0;padding:0;max-width:100%;}
  .report{border:1.5px solid #000;}
  th,td{border-color:#000;padding:2px 3px;font-size:7.5px;}
  th{background:#e0e0e0!important;color:#000!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .vl{background:#f0f0f0!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .section-title{background:#ebebeb!important;color:#000!important;padding:4px 10px!important;font-size:10px!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .report-header h2{font-size:13px!important;}
  .report-header .sub{font-size:9px!important;}
  .report-meta{background:#f8f8f8!important;font-size:9px!important;padding:4px 10px!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .notes-cell{max-width:60px;font-size:7px;}
  .val{font-size:7.5px;}
  .no-photo .photo-col{display:none!important;}
  @page{size:A4 portrait;margin:5mm;}
}
</style>
</head>
<body>

<div class="toolbar">
  <div>
    <a href="dashboard.html" class="back-link">→ العودة للمتابعة</a>
    <h1>طباعة كشف جاهزية الآليات</h1>
  </div>
  <div class="toolbar-actions">
    <button class="t-btn primary" onclick="printReport(true)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
      طباعة مع الصور
    </button>
    <button class="t-btn" onclick="printReport(false)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
      طباعة بدون صور
    </button>
  </div>
</div>

<div class="print-area">
  <div class="report" id="report"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig={apiKey:"AIzaSyBfi7BxhuMVehfmtvIOLm1MVYeXk_BWVz0",authDomain:"nawwaf-7258c.firebaseapp.com",databaseURL:"https://nawwaf-7258c-default-rtdb.firebaseio.com",projectId:"nawwaf-7258c",storageBucket:"nawwaf-7258c.firebasestorage.app",messagingSenderId:"391747168751",appId:"1:391747168751:web:01777a553f7250d4ce6e1a"};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

function buildReport(fbData){
  let data=fbData||{};
  if(!fbData){ try{data=JSON.parse(localStorage.getItem("kabd_inspections")||"{}");}catch(e){} }
  const now=new Date();
  const dateStr=now.toLocaleDateString("ar-KW-u-nu-latn",{year:"numeric",month:"2-digit",day:"2-digit"});
  const days=["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
  const dayName=days[now.getDay()];

  function st(v){ return !v?"—":v==="تعمل"||v==="يعمل"?'<span class="ok">'+v+' ✓</span>':'<span class="bad">'+v+' ✗</span>'; }
  function cl(v){ return !v?"—":v==="نظيف"?'<span class="ok">نظيف ✓</span>':'<span class="bad">غير نظيف ✗</span>'; }
  function inspRow(id,d){ return d?`<td class="done-status">تم ✓</td>`:`<td class="not-done">✗</td>`; }
  function timeStr(d){ if(!d) return ""; const t=new Date(d.timestamp); return t.toLocaleTimeString("ar-KW-u-nu-latn",{hour:"2-digit",minute:"2-digit",hour12:false}); }
  function photosCell(d){ const srcs=d.photosData&&d.photosData.length?d.photosData:[d.photoData].filter(Boolean); return srcs.length?srcs.map(s=>`<img src="${s}" class="photo-cell" style="display:block;margin:2px 0;">`).join(""):"—"; }

  const d139=data["139"], d239=data["239"], d339=data["339"];
  const d439=data["439"], d539=data["539"], d2839=data["2839"], d731=data["731"], d839=data["839"];

  let html=`
    <div class="report-header">
      <h2>كشف جاهزية الآليات اليومي — مركز كبد للإطفاء 939</h2>
      <div class="sub">CIVIL DEFENSE · KABD FIRE STATION</div>
    </div>
    <div class="report-meta"><span>التاريخ: ${dateStr}</span><span>اليوم: ${dayName}</span></div>`;

  // === 1. جيب الضابط 139 ===
  html+=`<div class="section-title">جيب الضابط — 139</div>
  <table><thead><tr><th>اسم الفاحص</th><th>مستوى الوقود</th><th>أجهزة اللاسلكي</th><th>ملاحظات</th><th class="photo-col">صورة</th></tr></thead><tbody>`;
  if(d139){
    html+=`<tr><td class="val">${d139.operator||"—"}</td><td class="val">${d139.diesel}%</td><td class="val">${d139.radio||0}</td><td class="notes-cell">${d139.notes||"—"}</td><td class="photo-col">${photosCell(d139)}</td></tr>`;
  } else { html+=`<tr><td colspan="4" class="not-done">لم يتم الفحص</td><td class="photo-col not-done">—</td></tr>`; }
  html+=`</tbody></table>`;

  // === 2. آلية الإنقاذ 239 ===
  html+=`<div class="section-title">آلية الإنقاذ — 239</div>
  <table><thead><tr><th>اسم الفاحص</th><th>مستوى الوقود</th><th>ليتات 1</th><th>ليتات 2</th><th>مولد الكهرباء</th><th>وقود المولد</th><th>الهيدروليك</th><th>وقود الهيدروليك</th><th>ملاحظات</th><th class="photo-col">صورة</th></tr></thead><tbody>`;
  if(d239){
    html+=`<tr><td class="val">${d239.operator||"—"}</td><td class="val">${d239.diesel}%</td><td class="val">${d239.litat1||0}</td><td class="val">${d239.litat2||0}</td><td>${st(d239.generator)}</td><td class="val">${d239.genFuel||0}%</td><td>${st(d239.hydraulic)}</td><td class="val">${d239.hydFuel||0}%</td><td class="notes-cell">${d239.notes||"—"}</td><td class="photo-col">${photosCell(d239)}</td></tr>`;
  } else { html+=`<tr><td colspan="9" class="not-done">لم يتم الفحص</td><td class="photo-col not-done">—</td></tr>`; }
  html+=`</tbody></table>`;

  // === 3. آلية البمب 339 ===
  html+=`<div class="section-title">آلية البمب — 339</div>
  <table><thead><tr><th>اسم الفاحص</th><th>مستوى الوقود</th><th>مستوى الماء</th><th>الفوم</th><th>هوز 1.5</th><th>هوز 2.5</th><th>الفكنوزل</th><th>الموزع</th><th>كاميرة حرارية</th><th>عدد الليتات</th><th>ملاحظات</th><th class="photo-col">صورة</th></tr></thead><tbody>`;
  if(d339){
    html+=`<tr><td class="val">${d339.operator||"—"}</td><td class="val">${d339.diesel}%</td><td class="val">${d339.water}%</td><td class="val">${d339.foam||0}%</td><td class="val">${d339.hose1}</td><td class="val">${d339.hose2}</td><td class="val">${d339.nozzle}</td><td class="val">${d339.mawza}</td><td class="val">${d339.thermalCam||0}</td><td class="val">${d339.bricks339||0}</td><td class="notes-cell">${d339.notes||"—"}</td><td class="photo-col">${photosCell(d339)}</td></tr>`;
  } else { html+=`<tr><td colspan="11" class="not-done">لم يتم الفحص</td><td class="photo-col not-done">—</td></tr>`; }
  html+=`</tbody></table>`;

  // === 4. تناكر ماء / وانيت الخدمات ===
  html+=`<div class="section-title">تناكر ماء / وانيت الخدمات — 439 · 539 · 2839 · 731</div>
  <table><thead><tr><th>الآلية</th><th>النوع</th><th>اسم الفاحص</th><th>مستوى الوقود</th><th>مستوى الماء</th><th>هوز 1.5</th><th>هوز 2.5</th><th>الفكنوزل</th><th>الموزع</th><th>تنظيف</th><th>ملاحظات</th><th class="photo-col">صورة</th></tr></thead><tbody>`;

  [{id:"439",type:"تنكر"},{id:"539",type:"تنكر"},{id:"2839",type:"تريلة"},{id:"731",type:"وانيت"}].forEach(v=>{
    const d=data[v.id];
    if(d){
      const isVan=v.id==="731";
      html+=`<tr><td class="vl">${v.id}</td><td class="vl">${v.type}</td><td class="val">${d.operator||"—"}</td><td class="val">${d.diesel}%</td><td class="val">${isVan?"—":d.water+"%"}</td><td class="val">${isVan?"—":d.hose1}</td><td class="val">${isVan?"—":d.hose2}</td><td class="val">${isVan?"—":d.nozzle}</td><td class="val">${isVan?"—":d.mawza}</td><td>${v.id==="2839"||v.id==="731"?cl(d.clean):"—"}</td><td class="notes-cell">${d.notes||"—"}</td><td class="photo-col">${photosCell(d)}</td></tr>`;
    } else {
      html+=`<tr><td class="vl">${v.id}</td><td class="vl">${v.type}</td><td colspan="9" class="not-done">لم يتم الفحص</td><td class="photo-col not-done">—</td></tr>`;
    }
  });
  html+=`</tbody></table>`;

  // === 5. آلية التنفس 839 ===
  html+=`<div class="section-title">آلية التنفس — 839</div>
  <table><thead><tr><th>اسم الفاحص</th><th>مستوى الوقود</th><th>جهاز كامل</th><th>اسطوانة احتياط</th><th>ديزل مكينة تعبئة الاسطوانات</th><th>ملاحظات</th><th class="photo-col">صورة</th></tr></thead><tbody>`;
  if(d839){
    html+=`<tr><td class="val">${d839.operator||"—"}</td><td class="val">${d839.diesel}%</td><td class="val">${d839.breathFull||0}</td><td class="val">${d839.breathSpare||0}</td><td class="val">${d839.fillDiesel||0}%</td><td class="notes-cell">${d839.notes||"—"}</td><td class="photo-col">${photosCell(d839)}</td></tr>`;
  } else { html+=`<tr><td colspan="6" class="not-done">لم يتم الفحص</td><td class="photo-col not-done">—</td></tr>`; }
  html+=`</tbody></table>`;

  document.getElementById("report").innerHTML=html;
}

function printReport(withPhotos){
  const report=document.getElementById("report");
  if(!withPhotos){ report.classList.add("no-photo"); } else { report.classList.remove("no-photo"); }
  setTimeout(()=>window.print(),100);
}

db.ref("inspections").once("value").then(snap=>{
  buildReport(snap.val()||{});
}).catch(()=>buildReport());
</script>
</body>
</html>
