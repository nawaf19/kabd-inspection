<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>إنجاز مهام يومية — مركز كبد</title>
<meta name="theme-color" content="#16181C">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#E9EAE4;--surface:#FFFFFF;--ink:#16181C;--muted:#6A6F77;
  --line:#DDDED6;--line-strong:#C9CAC1;
  --ember:#D33C1C;--ember-soft:#FBE7E0;
  --water:#137C9E;--water-soft:#E1F0F5;
  --green:#1B7A3D;--green-soft:#E2F3E8;
  --orange:#E6790B;--orange-soft:#FFF3E0;
  --header:#16181C;--radius:16px;
  --shadow:0 1px 2px rgba(22,24,28,.05), 0 8px 24px rgba(22,24,28,.06);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font-family:"IBM Plex Sans Arabic",system-ui,sans-serif;font-size:16px;line-height:1.5;padding-bottom:120px;-webkit-font-smoothing:antialiased;}
header{position:sticky;top:0;z-index:30;background:var(--header);color:#F4F3EE;padding:calc(env(safe-area-inset-top) + 16px) 18px 16px;border-bottom:3px solid var(--green);}
.h-eyebrow{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:2px;color:#9AA0A8;text-transform:uppercase;display:flex;align-items:center;gap:8px;}
.h-eyebrow::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;box-shadow:0 0 0 3px rgba(27,122,61,.25);}
header h1{margin:6px 0 0;font-size:22px;font-weight:700;}
.user-badge{display:inline-block;margin-top:6px;font-size:12px;color:#9AA0A8;background:rgba(255,255,255,.08);padding:4px 10px;border-radius:8px;}
main{max-width:560px;margin:0 auto;padding:16px 14px 0;}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:14px;}
.field-head{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.field-num{font-family:"IBM Plex Mono",monospace;font-weight:600;font-size:12px;width:26px;height:26px;flex:none;border-radius:8px;background:var(--ink);color:#fff;display:grid;place-items:center;}
.field-title{font-weight:700;font-size:16px;}
.field-sub{font-size:12.5px;color:var(--muted);margin-top:2px;}
.select-wrap{position:relative;}
select{width:100%;appearance:none;-webkit-appearance:none;font-family:"IBM Plex Sans Arabic",sans-serif;font-size:18px;font-weight:600;color:var(--ink);background:#F7F7F3;border:1.5px solid var(--line-strong);border-radius:12px;padding:16px 18px;padding-left:44px;}
select:focus-visible{outline:2px solid var(--green);outline-offset:2px;}
select.placeholder{color:var(--muted);font-weight:500;}
.select-wrap::after{content:"";position:absolute;left:18px;top:50%;width:10px;height:10px;margin-top:-7px;border-right:2px solid var(--muted);border-bottom:2px solid var(--muted);transform:rotate(45deg);pointer-events:none;}
textarea{width:100%;min-height:110px;resize:vertical;font-family:"IBM Plex Sans Arabic",sans-serif;font-size:16px;color:var(--ink);background:#F7F7F3;border:1.5px solid var(--line-strong);border-radius:12px;padding:14px;line-height:1.6;}
textarea:focus-visible{outline:2px solid var(--green);outline-offset:2px;background:#fff;}
.photo-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:16px;border:1.5px dashed var(--line-strong);border-radius:12px;background:#F7F7F3;color:var(--ink);font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;}
.photo-btn:active{background:var(--green-soft);}
.preview{margin-top:12px;position:relative;display:none;}
.preview img{width:100%;border-radius:12px;display:block;border:1px solid var(--line);}
.preview .rm{position:absolute;top:10px;left:10px;background:rgba(22,24,28,.85);color:#fff;border:none;width:36px;height:36px;border-radius:50%;font-size:20px;cursor:pointer;display:grid;place-items:center;}
.sendbar{position:fixed;bottom:0;left:0;right:0;z-index:40;background:rgba(233,234,228,.9);backdrop-filter:blur(10px);border-top:1px solid var(--line);padding:12px 14px calc(env(safe-area-inset-bottom) + 12px);}
.sendbar .inner{max-width:560px;margin:0 auto;}
.send-btn{width:100%;border:none;border-radius:14px;cursor:pointer;background:var(--green);color:#fff;font-family:inherit;font-weight:700;font-size:18px;padding:18px;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 6px 18px rgba(27,122,61,.35);transition:transform .08s;}
.send-btn:active{transform:scale(.98);}
.err{display:none;background:var(--ember-soft);color:#9a2a12;border:1px solid #f0b9a9;border-radius:10px;padding:10px 14px;font-size:13.5px;font-weight:600;margin-bottom:10px;}
.back-link{display:block;text-align:center;margin-top:12px;color:var(--water);font-weight:700;font-size:14px;text-decoration:none;}
</style>
</head>
<body>
<header>
  <div class="h-eyebrow">CIVIL DEFENSE · KABD</div>
  <h1>إنجاز مهام يومية</h1>
  <div class="user-badge" id="userBadge"></div>
</header>
<main>

  <section class="card">
    <div class="field-head"><div class="field-num">1</div><div><div class="field-title">رقم الآلية</div><div class="field-sub">اختر الآلية التي طلعت عليها</div></div></div>
    <div class="select-wrap">
      <select id="vehicle" class="placeholder">
        <option value="" disabled selected>اختر رقم الآلية</option>
        <option value="139">139 — جيب الضابط</option>
        <option value="239">239 — الإنقاذ</option>
        <option value="339">339 — البمب</option>
        <option value="439">439 — تنكر</option>
        <option value="539">539 — تنكر</option>
        <option value="2839">2839 — تريلة</option>
        <option value="731">731 — وانيت الخدمات</option>
        <option value="839">839 — آلية التنفس</option>
      </select>
    </div>
  </section>

  <section class="card">
    <div class="field-head"><div class="field-num">2</div><div><div class="field-title">المهمة المنجزة</div><div class="field-sub">اكتب ما قمت به</div></div></div>
    <textarea id="taskDesc" placeholder="مثال: تم تنظيف الآلية وفحص الإطارات وتعبئة الوقود..."></textarea>
  </section>

  <section class="card">
    <div class="field-head"><div class="field-num">3</div><div><div class="field-title">صورة</div><div class="field-sub">صوّر الآلية أو المهمة (اختياري)</div></div></div>
    <label class="photo-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:22px;height:22px;"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      التقاط صورة
      <input type="file" accept="image/*" capture="environment" id="photoInput" style="display:none;" onchange="onPhoto(this)">
    </label>
    <div class="preview" id="preview">
      <img id="previewImg" src="">
      <button class="rm" onclick="removePhoto()">✕</button>
    </div>
  </section>

</main>

<div class="sendbar"><div class="inner">
  <div class="err" id="err"></div>
  <button class="send-btn" id="send" type="button">✓ إرسال المهمة</button>
  <a href="entry.html" class="back-link">← العودة لصفحة الدخول</a>
</div></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig={apiKey:"AIzaSyBfi7BxhuMVehfmtvIOLm1MVYeXk_BWVz0",authDomain:"nawwaf-7258c.firebaseapp.com",databaseURL:"https://nawwaf-7258c-default-rtdb.firebaseio.com",projectId:"nawwaf-7258c",storageBucket:"nawwaf-7258c.firebasestorage.app",messagingSenderId:"391747168751",appId:"1:391747168751:web:01777a553f7250d4ce6e1a"};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

const currentUser=JSON.parse(localStorage.getItem("kabd_current_user")||"null");
if(currentUser){
  document.getElementById("userBadge").textContent="🪪 "+currentUser.name+" — ملف: "+currentUser.fileNumber;
}

let photoData="";

function onPhoto(input){
  const file=input.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    photoData=e.target.result;
    document.getElementById("previewImg").src=photoData;
    document.getElementById("preview").style.display="block";
  };
  reader.readAsDataURL(file);
}

function removePhoto(){
  photoData="";
  document.getElementById("previewImg").src="";
  document.getElementById("preview").style.display="none";
  document.getElementById("photoInput").value="";
}

const err=document.getElementById("err");
document.getElementById("send").addEventListener("click",()=>{
  const vehicle=document.getElementById("vehicle").value;
  const taskDesc=document.getElementById("taskDesc").value.trim();
  if(!vehicle){ err.textContent="الرجاء اختيار رقم الآلية"; err.style.display="block"; return; }
  if(!taskDesc){ err.textContent="الرجاء كتابة المهمة المنجزة"; err.style.display="block"; return; }
  err.style.display="none";

  const btn=document.getElementById("send");
  btn.textContent="جاري الإرسال...";
  btn.disabled=true;

  const record={
    vehicle,
    task: taskDesc,
    operator: currentUser?currentUser.name:"",
    fileNumber: currentUser?currentUser.fileNumber:"",
    timestamp: new Date().toISOString()
  };
  if(photoData) record.photo=photoData;

  db.ref("daily_tasks").push(record).then(()=>{
    btn.textContent="✓ تم الإرسال";
    btn.style.background="#1B7A3D";
    document.getElementById("vehicle").value="";
    document.getElementById("vehicle").classList.add("placeholder");
    document.getElementById("taskDesc").value="";
    removePhoto();
    setTimeout(()=>{
      btn.textContent="✓ إرسال المهمة";
      btn.style.background="";
      btn.disabled=false;
    },2500);
  }).catch(()=>{
    err.textContent="خطأ في الإرسال — تأكد من الإنترنت";
    err.style.display="block";
    btn.textContent="✓ إرسال المهمة";
    btn.disabled=false;
  });
});
</script>
</body>
</html>
